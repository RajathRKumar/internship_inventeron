<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>Registration Form</h2>

    <form id="regForm">
        <label>First Name</label>
        <input type="text" id="fname" required>

        <label>Middle Name</label>
        <input type="text" id="mname">

        <label>Last Name</label>
        <input type="text" id="lname" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Phone Number</label>
        <input type="text" id="phone" required>

        <label>Gender</label>
        <div class="gender">
            <input type="radio" name="gender" value="Male" required> Male
            <input type="radio" name="gender" value="Female"> Female
        </div>

        <label>Address</label>
        <textarea id="address" rows="3" required></textarea>

        <label>Date of Birth</label>
        <input type="date" id="dob" required>

        <div class="buttons">
            <button type="reset" class="clear-btn">Clear</button>
            <button type="submit" class="submit-btn">Submit</button>
        </div>
    </form>

    <div class="result" id="result">
        <h3>Successfully Registered.</h3>
        
        <p><strong>Name:</strong> <span id="rname"></span></p>
        <p><strong>Email:</strong> <span id="remail"></span></p>
        <p><strong>Phone:</strong> <span id="rphone"></span></p>
        <p><strong>Gender:</strong> <span id="rgender"></span></p>
        <p><strong>Address:</strong> <span id="raddress"></span></p>
        <p><strong>Date of Birth:</strong> <span id="rdob"></span></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
