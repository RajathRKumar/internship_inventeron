<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard SPA</title>

  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">


<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🚀 Student SPA</a>
        <div>
            <button class="btn btn-outline-light me-2" onclick="showSection('home')">Home</button>
            <button class="btn btn-outline-light me-2" onclick="showSection('students')">Students</button>
            <button class="btn btn-warning" onclick="showSection('add')">Add Student</button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div id="homeSection">
        <div class="card bg-gradient bg-info text-dark shadow-lg p-4">
            <h3 class="fw-bold">Welcome to Student Dashboard</h3>
            <p>This is a cool Single Page Application built using Bootstrap only.</p>
        </div>
    </div>

  
    <div id="studentsSection" class="d-none">
        <h3 class="mb-3 text-warning">📚 Student List</h3>
        <div id="studentList" class="row"></div>
    </div>

  
    <div id="addSection" class="d-none">
        <div class="card bg-secondary shadow p-4">
            <h4 class="text-warning">➕ Add New Student</h4>

            <input type="text" id="name" class="form-control mb-2" placeholder="Enter Name">
            <input type="number" id="marks" class="form-control mb-3" placeholder="Enter Marks">

            <button class="btn btn-success w-100" onclick="addStudent()">Add Student</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
